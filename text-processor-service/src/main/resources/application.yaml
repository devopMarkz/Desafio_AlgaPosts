spring:
  application:
    name: text-processor-service
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "rabbitmq"
    password: "rabbitmq"
    listener:
      simple:
        default-requeue-rejected: false
        prefetch: 2
        retry:
          enabled: true
          initial-interval: 10s
          max-interval: 20s
          multiplier: 2
          max-retries: 3

server:
  port: 8081
