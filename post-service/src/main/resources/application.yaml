spring:
  application:
    name: post-service

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: "localhost"
    port: 5672
    username: "rabbitmq"
    password: "rabbitmq"

  jpa:
    open-in-view: false